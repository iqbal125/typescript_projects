name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

jobs:
  nx:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Setup Node from .nvmrc
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Set SHAs for affected (pull_request)
        if: github.event_name == 'pull_request'
        run: |
          echo "NX_BASE=${{ github.event.pull_request.base.sha }}" >> $GITHUB_ENV
          echo "NX_HEAD=${{ github.event.pull_request.head.sha }}" >> $GITHUB_ENV

      - name: Set SHAs for affected (push)
        if: github.event_name == 'push'
        uses: nrwl/nx-set-shas@v5

      - name: Lint, test, and build affected
        run: pnpm nx affected -t lint test build --parallel=3 --verbose --exclude=playwright
        env:
          CI: true
          NODE_OPTIONS: --conditions=@org/source
