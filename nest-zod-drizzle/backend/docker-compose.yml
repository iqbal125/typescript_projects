services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nestapp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://postgres:postgres@db:5432/nestapp
      JWT_SECRET: change-this-to-a-secure-secret-at-least-32-characters
      JWT_EXPIRATION: 24h
      CORS_ENABLED: "true"
      CORS_ORIGIN: "*"
      LOG_LEVEL: info
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
